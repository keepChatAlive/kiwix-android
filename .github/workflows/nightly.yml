name: Nightly

on:
  workflow_dispatch:

jobs:

  release:
    runs-on: ubuntu-22.04
    steps:

      - name: checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: 11
          distribution: temurin

      - name: build debug
        run: ./gradlew assembleNightly

      - name: release debug
        uses: actions/upload-artifact@v3
        if: failure()
        with:
          path: app/build/outputs/apk/nightly/*universal*.apk
